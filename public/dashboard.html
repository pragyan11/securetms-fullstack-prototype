<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureTMS – Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" href="index.html">Secure<span>TMS</span></a>
      <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
      </nav>
    </header>

    <main class="container">
      <section class="card dashboard-card" id="dashboard">
        <div class="dashboard-header">
          <div>
            <p class="eyebrow">Operations console</p>
            <h2>Dashboard</h2>
          </div>
          <button class="btn btn-secondary" id="logoutBtn" type="button" aria-label="Logout">Logout</button>
        </div>

        <div class="output-panel">
          <div class="output-toolbar">
            <h3>System response</h3>
            <div class="inner-tabs">
              <button class="inner-tab active" data-tab="bookingsTab">Bookings</button>
              <button class="inner-tab" data-tab="shipmentsTab">Shipments</button>
              <button class="inner-tab" data-tab="fleetTab">Fleet</button>
              <button class="inner-tab" data-tab="logsTab">Logs</button>
              <button class="inner-tab" data-tab="adminTab">Admin Stats</button>
            </div>
          </div>

          <div class="tab-content" id="bookingsTab">
            <div class="tab-actions">
                  <button class="btn btn-secondary" id="addBookingBtn" type="button" aria-label="Add Booking">Add Booking</button>
                  <button class="btn btn-secondary" id="refreshBookingsBtn" type="button" aria-label="Refresh Bookings">Refresh</button>
              </div>
              <!-- Hidden form for adding a new booking (now appears directly below the button) -->
              <div id="bookingFormContainer" class="hidden" style="margin-top:12px;">
                  <form id="bookingForm" class="card form-card">
                    <h3 class="eyebrow">New Booking</h3>
                    <label for="bookingCustomer">Customer Name</label>
                    <input type="text" id="bookingCustomer" name="customerName" class="form-control mb-2" required aria-label="Customer Name">
                    <label for="bookingOrigin">Origin</label>
                    <input type="text" id="bookingOrigin" name="origin" class="form-control mb-2" required aria-label="Origin">
                    <label for="bookingDestination">Destination</label>
                    <input type="text" id="bookingDestination" name="destination" class="form-control mb-2" required aria-label="Destination">
                    <label for="bookingStatus">Status</label>
                    <select id="bookingStatus" name="status" class="form-control mb-2">
                      <option value="Pending">Pending</option>
                      <option value="Confirmed">Confirmed</option>
                      <option value="Completed">Completed</option>
                    </select>
                    <div class="button-group">
                      <button type="submit" class="btn btn-primary" aria-label="Create Booking">Create Booking</button>
                      <button type="button" class="btn btn-secondary" id="cancelBookingBtn" aria-label="Cancel Booking">Cancel</button>
                    </div>
                  </form>
              </div>
                <div id="bookingsOutput" class="tab-output">Loading bookings…</div>
          </div>

          <div class="tab-content hidden" id="shipmentsTab">
            <div class="tab-actions">
                  <button class="btn btn-secondary" id="addShipmentBtn" type="button" aria-label="Add Shipment">Add Shipment</button>
                  <button class="btn btn-secondary" id="refreshShipmentsBtn" type="button" aria-label="Refresh Shipments">Refresh Shipments</button>
              </div>
              <!-- Hidden form for adding a new shipment (now appears directly below the button) -->
              <div id="shipmentFormContainer" class="hidden" style="margin-top:12px;">
                  <form id="shipmentForm" class="card form-card">
                    <h3 class="eyebrow">New Shipment</h3>
                    <label for="shipmentId">Shipment ID</label>
                    <input type="text" id="shipmentId" name="shipmentId" placeholder="Optional" class="form-control mb-2" aria-label="Shipment ID (optional)">
                    <label for="vehicleNumber">Vehicle Number</label>
                    <input type="text" id="vehicleNumber" name="vehicleNumber" class="form-control mb-2" required aria-label="Vehicle Number">
                    <label for="driverName">Driver Name</label>
                    <input type="text" id="driverName" name="driverName" class="form-control mb-2" required aria-label="Driver Name">
                    <label for="shipmentStatus">Status</label>
                    <select id="shipmentStatus" name="status" class="form-control mb-2">
                      <option value="Created">Created</option>
                      <option value="In Transit">In Transit</option>
                      <option value="Delivered">Delivered</option>
                    </select>
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" class="form-control mb-2" required aria-label="Location">
                    <div class="button-group">
                      <button type="submit" class="btn btn-primary" aria-label="Create Shipment">Create Shipment</button>
                      <button type="button" class="btn btn-secondary" id="cancelShipmentBtn" aria-label="Cancel Shipment">Cancel</button>
                    </div>
                  </form>
              </div>
                <div id="shipmentsOutput" class="tab-output">Loading shipments…</div>
          </div>

          <div class="tab-content hidden" id="fleetTab">
            <div class="tab-actions">
                  <button class="btn btn-secondary" id="addVehicleBtn" type="button" aria-label="Add Vehicle">Add Vehicle</button>
                  <button class="btn btn-secondary" id="refreshFleetBtn" type="button" aria-label="Refresh Fleet">Refresh Fleet</button>
              </div>
              <!-- Hidden form for adding a new vehicle (now appears directly below the button) -->
              <div id="vehicleFormContainer" class="hidden" style="margin-top:12px;">
                  <form id="vehicleForm" class="card form-card">
                    <h3 class="eyebrow">New Vehicle</h3>
                    <label for="vehicleNumber">Vehicle Number</label>
                    <input type="text" id="vehicleNumber" name="vehicleNumber" class="form-control mb-2" required aria-label="Vehicle Number">
                    <label for="vehicleType">Vehicle Type</label>
                    <input type="text" id="vehicleType" name="vehicleType" class="form-control mb-2" required aria-label="Vehicle Type">
                    <label for="driverName">Driver Name</label>
                    <input type="text" id="driverName" name="driverName" placeholder="Unassigned" class="form-control mb-2" aria-label="Driver Name">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" placeholder="Hub" class="form-control mb-2" aria-label="Location">
                    <label for="vehicleStatus">Status</label>
                    <select id="vehicleStatus" name="status" class="form-control mb-2">
                      <option value="Available">Available</option>
                      <option value="In Transit">In Transit</option>
                      <option value="Maintenance">Maintenance</option>
                    </select>
                    <div class="button-group">
                      <button type="submit" class="btn btn-primary" aria-label="Add Vehicle">Add Vehicle</button>
                      <button type="button" class="btn btn-secondary" id="cancelVehicleBtn" aria-label="Cancel Vehicle">Cancel</button>
                    </div>
                  </form>
              </div>
                <div id="fleetOutput" class="tab-output">Loading fleet…</div>
          </div>

          <div class="tab-content hidden" id="logsTab">
            <div class="tab-actions">
              <button class="btn btn-secondary" id="refreshLogsBtn" type="button" aria-label="Refresh Logs">Refresh Logs</button>
            </div>
            <pre id="logsOutput" class="tab-output">Loading logs…</pre>
          </div>

          <div class="tab-content hidden" id="adminTab">
            <div class="tab-actions">
              <button class="btn btn-secondary" id="refreshAdminBtn" type="button" aria-label="Refresh Admin Stats">Refresh Admin Stats</button>
            </div>
            <!-- Fixed admin toggle buttons -->
            <div class="tab-actions" style="margin-top:0.5rem;">
              <button class="btn btn-secondary" id="showAdminUsersBtn" type="button" aria-label="Show Users">Show Users</button>
              <button class="btn btn-secondary" id="showAdminBookingsBtn" type="button" aria-label="Show Bookings">Show Bookings</button>
              <button class="btn btn-secondary" id="showAdminShipmentsBtn" type="button" aria-label="Show Shipments">Show Shipments</button>
              <button class="btn btn-secondary" id="showAdminVehiclesBtn" type="button" aria-label="Show Vehicles">Show Vehicles</button>
            </div>
            <div id="adminOutput" class="tab-output">Loading admin stats…</div>
            <!-- Containers for admin sections (hidden by default) -->
            <div id="adminUsers" class="tab-output" style="display:none;"></div>
            <div id="adminUserLogs" class="tab-output" style="display:none;"></div>
            <div id="adminBookings" class="tab-output" style="display:none;"></div>
            <div id="adminShipments" class="tab-output" style="display:none;"></div>
            <div id="adminVehicles" class="tab-output" style="display:none;"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script src="admin.js"></script>
  </body>
</html>
