<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureTMS – Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" href="index.html">Secure<span>TMS</span></a>
      <nav>
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
        <a href="login.html">Login</a>
        <a href="dashboard.html">Dashboard</a>
      </nav>
    </header>

    <main class="container auth-shell">
      <section class="card auth-card">
        <p class="eyebrow">Access account</p>
        <h2>Login</h2>
        <p class="card-text">Authenticate using your registered email and a passkey-style sign-in experience.</p>

        <label for="loginEmail">Registered email</label>
        <input id="loginEmail" type="email" placeholder="Enter registered email" />

        <label for="loginMethod">Authentication method</label>
        <select id="loginMethod">
          <option value="Passkey">Passkey</option>
          <option value="Face">Face</option>
        </select>

        <!-- Video element for face capture (hidden by default) -->
        <video id="faceVideo" autoplay playsinline style="display:none; width:200px; height:auto; margin-top:10px;"></video>

        <div class="button-group">
          <button class="btn btn-primary" id="loginBtn" type="button">Sign in with Passkey</button>
          <button class="btn btn-secondary" id="recoverBtn" type="button">Recover Account</button>
          <button class="btn btn-secondary" id="prepareCamBtn" type="button">Prepare Camera</button>
        </div>

        <p id="loginMsg" class="message"></p>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
